<!DOCTYPE html>
<html>
<head>
    <title>Quiz </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .question-card {
            background: #f9fafc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            border-left: 5px solid #4CAF50;
        }
        .question-card p {
            font-size: 18px;
            color: #222;
        }
        label {
            display: block;
            background: white;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.3s;
        }
        label:hover {
            background: #e8f5e9;
            border-color: #4CAF50;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📝 Simple Quiz</h2>
    <form action="/submit" method="post">
        {% for q in questions %}
        <div class="question-card">
        <p><b>{{ loop.index }}. {{ q.q }}</b></p>
        {% for opt in q.options %}
    <label>
        <input 
         type="radio" 
         name="{{ q.id }}"
         value="{{ opt }}" 
         required>
         {{ opt }}
     </label>
     {% endfor %}
            </div>
     {% endfor %}
        <button type="submit">
            Finish Quiz
        </button>
    </form>
</div>
</body>
</html>
